name: Terraform Security Scan

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # tfsec runs against the repository source itself, so it does not require
      # backend credentials or a live AWS session to catch common Terraform risks.
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .
          format: sarif
          soft_fail: false
          additional_args: --force-all-dirs

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
